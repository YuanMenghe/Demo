# 构建 medical-copilot 并部署整个 Demo 站点到 GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            medical-copilot/package-lock.json
            fda-submission-gap-analyzer/package-lock.json

      - name: Install and build medical-copilot
        working-directory: medical-copilot
        env:
          BASE_PATH: /${{ github.event.repository.name }}/medical-copilot/
        run: |
          npm ci
          npm run build

      - name: Install and build fda-submission-gap-analyzer
        working-directory: fda-submission-gap-analyzer
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/fda-submission-gap-analyzer/
        run: |
          npm ci
          npm run build

      - name: Verify build output
        run: |
          echo "=== Built index.html ==="
          cat medical-copilot/dist/index.html
          echo ""
          if ! grep -q "medical-copilot/assets" medical-copilot/dist/index.html; then
            echo "::error::BASE_PATH not applied in build output!"
            exit 1
          fi

      - name: Assemble full site
        run: |
          mkdir -p site/medical-copilot
          mkdir -p site/plm
          mkdir -p site/zhihui-mdt
          mkdir -p site/fda-submission-gap-analyzer
          mkdir -p site/ethics-ai-review-showcase

          # medical-copilot (built React app)
          cp -r medical-copilot/dist/* site/medical-copilot/

          # fda-submission-gap-analyzer (built React app)
          cp -r fda-submission-gap-analyzer/dist/* site/fda-submission-gap-analyzer/

          # plm (static HTML)
          cp -r plm/* site/plm/

          # zhihui-mdt (static HTML)
          cp -r zhihui-mdt/* site/zhihui-mdt/

          # ethics-ai-review-showcase (static HTML, AI 伦理审评工作台原型)
          cp -r ethics-ai-review-showcase/* site/ethics-ai-review-showcase/

          # Root: landing page with links
          cat > site/index.html << 'LANDING'
          <!DOCTYPE html>
          <html lang="zh">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Demo</title>
            <style>
              body{font-family:system-ui,sans-serif;max-width:600px;margin:60px auto;padding:0 20px;color:#1e293b}
              h1{font-size:1.5rem}
              a{display:block;padding:12px 16px;margin:8px 0;border:1px solid #e2e8f0;border-radius:8px;color:#0f766e;text-decoration:none;font-weight:500}
              a:hover{background:#f0fdfa;border-color:#0f766e}
            </style>
          </head>
          <body>
            <h1>Demo Projects</h1>
            <a href="medical-copilot/">Medical Copilot</a>
            <a href="fda-submission-gap-analyzer/">FDA Submission Gap Analyzer</a>
            <a href="zhihui-mdt/">智汇MDT</a>
            <a href="plm/">PLM</a>
            <a href="ethics-ai-review-showcase/">EthicsFlow AI · 伦理审评工作台</a>
          </body>
          </html>
          LANDING

          # SPA fallback for medical-copilot
          cp site/medical-copilot/index.html site/404.html

          echo "=== Site structure ==="
          find site -maxdepth 2 -type f | head -30

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
