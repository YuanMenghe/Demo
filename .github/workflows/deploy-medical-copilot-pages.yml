# 构建 medical-copilot 并部署整个 Demo 站点到 GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            medical-copilot/package-lock.json
            fda-submission-gap-analyzer/package-lock.json
            ai伦理审查辅助系统/package-lock.json
            roche-noah-ai-demo/package-lock.json
            ZheEr_MiniProgram/package-lock.json

      - name: Install and build medical-copilot
        working-directory: medical-copilot
        env:
          BASE_PATH: /${{ github.event.repository.name }}/medical-copilot/
        run: |
          npm ci
          npm run build

      - name: Install and build fda-submission-gap-analyzer
        working-directory: fda-submission-gap-analyzer
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/fda-submission-gap-analyzer/
        run: |
          npm ci
          npm run build

      - name: Install and build AI ethics assistant (Noah AI)
        working-directory: ai伦理审查辅助系统
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/ai伦理审查辅助系统/
        run: |
          npm ci
          npm run build

      - name: Install and build Roche NOAH AI demo
        working-directory: roche-noah-ai-demo
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/roche-noah-ai-demo/
        run: |
          npm ci
          npm run build

      - name: Install and build ZheEr MiniProgram (淋巴瘤指南查询小程序)
        working-directory: ZheEr_MiniProgram
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/ZheEr_MiniProgram/
        run: |
          npm ci
          npm run build

      - name: Verify build output
        run: |
          echo "=== Built index.html ==="
          cat medical-copilot/dist/index.html
          echo ""
          if ! grep -q "medical-copilot/assets" medical-copilot/dist/index.html; then
            echo "::error::BASE_PATH not applied in build output!"
            exit 1
          fi

      - name: Assemble full site
        run: |
          mkdir -p site/medical-copilot
          mkdir -p site/plm
          mkdir -p site/zhihui-mdt
          mkdir -p site/fda-submission-gap-analyzer
          mkdir -p "site/ai伦理审查辅助系统"
          mkdir -p site/roche-noah-ai-demo
          mkdir -p site/ZheEr_MiniProgram

          # medical-copilot (built React app)
          cp -r medical-copilot/dist/* site/medical-copilot/

          # fda-submission-gap-analyzer (built React app)
          cp -r fda-submission-gap-analyzer/dist/* site/fda-submission-gap-analyzer/

          # plm (static HTML)
          cp -r plm/* site/plm/

          # zhihui-mdt (static HTML)
          cp -r zhihui-mdt/* site/zhihui-mdt/

          # AI伦理审查辅助系统 / Noah AI (Vite + React)
          cp -r ai伦理审查辅助系统/dist/* "site/ai伦理审查辅助系统/"

          # roche-noah-ai-demo (Vite + React)
          cp -r roche-noah-ai-demo/dist/* site/roche-noah-ai-demo/

          # ZheEr MiniProgram / 淋巴瘤指南查询小程序 (Vite + React)
          cp -r ZheEr_MiniProgram/dist/* site/ZheEr_MiniProgram/

          # Root: landing page with links
          cat > site/index.html << 'LANDING'
          <!DOCTYPE html>
          <html lang="zh">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Demo · 项目导航</title>
            <style>
              :root {
                --bg: #f4f7f5;
                --surface: #fff;
                --text: #0f172a;
                --muted: #64748b;
                --accent: #0d9488;
                --accent-soft: #ccfbf1;
                --border: #e2e8f0;
                --shadow: 0 1px 3px rgb(15 23 42 / 0.06), 0 4px 12px rgb(15 23 42 / 0.04);
                --shadow-hover: 0 8px 24px rgb(13 148 136 / 0.12);
                --radius: 14px;
              }
              * { box-sizing: border-box; }
              body {
                margin: 0;
                min-height: 100vh;
                font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
                color: var(--text);
                background: var(--bg);
                background-image: radial-gradient(ellipse 120% 80% at 50% -20%, rgb(204 251 241 / 0.65), transparent);
              }
              .wrap {
                max-width: 1040px;
                margin: 0 auto;
                padding: clamp(1.5rem, 4vw, 3rem) clamp(1rem, 3vw, 1.75rem) 3rem;
              }
              header {
                margin-bottom: clamp(1.75rem, 4vw, 2.5rem);
              }
              header h1 {
                margin: 0 0 0.35rem;
                font-size: clamp(1.5rem, 4vw, 1.85rem);
                font-weight: 700;
                letter-spacing: -0.02em;
                color: var(--text);
              }
              header p {
                margin: 0;
                font-size: 0.95rem;
                color: var(--muted);
                max-width: 42rem;
                line-height: 1.55;
              }
              .grid {
                display: grid;
                gap: 1rem;
                grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr));
              }
              @media (min-width: 720px) {
                .grid { grid-template-columns: repeat(2, 1fr); }
              }
              @media (min-width: 960px) {
                .grid { grid-template-columns: repeat(3, 1fr); gap: 1.15rem; }
              }
              a.card {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                gap: 0.4rem;
                padding: 1.15rem 1.2rem 1.2rem;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                text-decoration: none;
                color: inherit;
                box-shadow: var(--shadow);
                transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
              }
              a.card:hover {
                transform: translateY(-2px);
                border-color: rgb(13 148 136 / 0.35);
                box-shadow: var(--shadow-hover);
              }
              a.card:focus-visible {
                outline: 2px solid var(--accent);
                outline-offset: 2px;
              }
              .card-title {
                font-size: 1rem;
                font-weight: 600;
                color: var(--accent);
                line-height: 1.35;
              }
              .card-desc {
                font-size: 0.8125rem;
                color: var(--muted);
                line-height: 1.45;
              }
              footer {
                margin-top: 2.5rem;
                padding-top: 1.25rem;
                border-top: 1px solid var(--border);
                font-size: 0.75rem;
                color: var(--muted);
              }
            </style>
          </head>
          <body>
            <div class="wrap">
              <header>
                <h1>Demo Projects</h1>
                <p>以下为演示与原型入口，点击卡片进入对应子站（GitHub Pages 子路径部署）。</p>
              </header>
              <main class="grid">
                <a class="card" href="medical-copilot/">
                  <span class="card-title">Medical Copilot</span>
                  <span class="card-desc">临床对话与辅助流程演示</span>
                </a>
                <a class="card" href="fda-submission-gap-analyzer/">
                  <span class="card-title">FDA Submission Gap Analyzer</span>
                  <span class="card-desc">申报材料与差距分析示意</span>
                </a>
                <a class="card" href="zhihui-mdt/">
                  <span class="card-title">智汇MDT</span>
                  <span class="card-desc">多学科会诊与病例看板</span>
                </a>
                <a class="card" href="plm/">
                  <span class="card-title">PLM</span>
                  <span class="card-desc">产品生命周期与协作示意</span>
                </a>
                <a class="card" href="ai伦理审查辅助系统/">
                  <span class="card-title">Noah AI · AI伦理审查辅助系统</span>
                  <span class="card-desc">伦理审查与政策库辅助</span>
                </a>
                <a class="card" href="roche-noah-ai-demo/">
                  <span class="card-title">Roche NOAH AI · 若生科研平台</span>
                  <span class="card-desc">科研与人才场景演示</span>
                </a>
                <a class="card" href="ZheEr_MiniProgram/">
                  <span class="card-title">淋巴瘤指南查询小程序</span>
                  <span class="card-desc">淋巴瘤指南与病例流程示意（NOAH AI）</span>
                </a>
              </main>
              <footer>YuanMenghe / Demo · GitHub Pages</footer>
            </div>
          </body>
          </html>
          LANDING

          # SPA fallback for medical-copilot
          cp site/medical-copilot/index.html site/404.html

          echo "=== Site structure ==="
          find site -maxdepth 2 -type f | head -30

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
