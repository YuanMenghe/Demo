# 构建并部署 medical-copilot 到 GitHub Pages
name: Deploy medical-copilot to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'medical-copilot/**'
      - '.github/workflows/deploy-medical-copilot-pages.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: medical-copilot/package-lock.json

      - name: Install and build medical-copilot
        working-directory: medical-copilot
        env:
          BASE_PATH: /${{ github.event.repository.name }}/medical-copilot/
        run: |
          npm ci
          npm run build

      - name: Verify base path in build
        run: |
          if ! grep -q "${{ github.event.repository.name }}/medical-copilot" medical-copilot/dist/index.html; then
            echo "::error::Built index.html missing base path. Check BASE_PATH env."
            cat medical-copilot/dist/index.html
            exit 1
          fi

      - name: Prepare Pages artifact (app under /medical-copilot/)
        run: |
          mkdir -p pages-root/medical-copilot
          cp -r medical-copilot/dist/* pages-root/medical-copilot/
          cp medical-copilot/dist/index.html pages-root/404.html
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta http-equiv="refresh" content="0;url=medical-copilot/"><script>location.href="medical-copilot/"</script></head><body>Redirecting to <a href="medical-copilot/">Medical Copilot</a>...</body></html>' > pages-root/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: pages-root

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
