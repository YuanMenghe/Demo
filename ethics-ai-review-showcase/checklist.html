<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EthicsFlow AI | 审核要点</title>
  <meta name="description" content="医院临床研究伦理审评工作台原型，审核要点页面。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-block">
        <img src="logo.svg" alt="公司 Logo">
        <div>
          <strong>EthicsFlow AI</strong>
          <span>伦理审评工作台</span>
        </div>
      </div>
      <button class="primary-action" type="button">+ 新建审评项目</button>
      <div class="side-section">
        <div class="section-title"><span>功能模块</span></div>
        <nav class="module-nav">
          <a class="module-link" href="index.html">项目中心</a>
          <a class="module-link" href="review.html">审评工作台</a>
          <a class="module-link" href="records.html">审查记录</a>
          <a class="module-link" href="policy.html">政策库</a>
          <a class="module-link active" href="checklist.html">审核要点</a>
        </nav>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <p class="eyebrow">Checklist Rules</p>
          <h1>审核要点</h1>
        </div>
        <div class="top-actions">
          <button class="ghost-button" type="button">新增要点</button>
        </div>
      </header>

      <section class="single-page-grid">
        <div class="panel">
          <div class="panel-head">
            <div>
              <h2>院内伦理审查要点清单</h2>
              <p>用于 AI 执行基础规则检查与经验沉淀</p>
            </div>
          </div>
          <div class="check-list big">
            <label><input type="checkbox" checked> 风险披露是否完整</label>
            <label><input type="checkbox" checked> 受试者权益描述是否清晰</label>
            <label><input type="checkbox" checked> 补偿机制是否可理解且可执行</label>
            <label><input type="checkbox" checked> 招募广告是否避免诱导与夸大获益</label>
            <label><input type="checkbox" checked> 更新稿是否回应历史审查意见</label>
            <label><input type="checkbox"> 是否说明替代路径或低侵入性方案</label>
          </div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
